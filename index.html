<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2e7d32" />
  <title>Calorie Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-icon-192-red.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="header-title">Calorie Log</h1>
    <div id="header-actions"></div>
  </header>

  <main id="view" class="view"></main>

  <nav class="tabbar">
    <button class="tab" data-tab="today"   aria-label="Calorie Log">📅<span>Log</span></button>
    <button class="tab" data-tab="foods"   aria-label="Foods">🍎<span>Foods</span></button>
    <button class="tab" data-tab="meals"   aria-label="Meals">🍲<span>Meals</span></button>
    <button class="tab" data-tab="trends"  aria-label="Trends">📈<span>Trends</span></button>
    <button class="tab" data-tab="settings" aria-label="Settings">⚙️<span>Settings</span></button>
  </nav>

  <!-- Modal host -->
  <div id="modal-root" class="modal-root hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/zxing.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
